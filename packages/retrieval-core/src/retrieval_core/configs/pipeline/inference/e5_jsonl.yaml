defaults:
  - _self_

components:
  input:
    type: retrieval_components.components.interfaces.stage_io.InferenceInput
  output:
    type: retrieval_components.components.interfaces.stage_io.InferenceOutput
  query_preprocessor:
    type: retrieval_components.components.preprocessing.text_preprocessor.TextPreprocessor
    init_parameters:
      prefix: "query: "
      replace_regexes:
        "\\s+": " "
  query_embedder:
    type: haystack.components.embedders.sentence_transformers_text_embedder.SentenceTransformersTextEmbedder
    init_parameters:
      model: intfloat/e5-small-v2
      normalize_embeddings: true
      device: ${runtime.device}
      progress_bar: ${runtime.progress_bar}
  retriever:
    type: retrieval_components.components.retrieval.jsonl_embedding_retriever.JsonlEmbeddingRetriever
    init_parameters:
      index_path: ${stage.index_path}
      top_k: 5
      similarity: cosine

connections:
  - sender: input.query
    receiver: query_preprocessor.text
  - sender: input.candidate_document_ids
    receiver: retriever.candidate_document_ids
  - sender: query_preprocessor.text
    receiver: query_embedder.text
  - sender: query_embedder.embedding
    receiver: retriever.query_embedding
  - sender: retriever.documents
    receiver: output.documents

max_runs_per_component: 100
metadata:
  description: E5 inference pipeline over the JSONL embedding index.
