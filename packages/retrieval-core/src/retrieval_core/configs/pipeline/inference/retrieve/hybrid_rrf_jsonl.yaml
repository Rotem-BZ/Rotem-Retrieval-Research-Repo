defaults:
  - /selections@_global_.selections: index
  - /selections/embedding_model@_global_.selections.embedding_model: ???
  - /component/query_parser@components.query_parser: content_field
  - /component/query_preprocessor@components.query_preprocessor: prefix_cleanup
  - /component/query_embedder@components.query_embedder: sentence_transformers
  - /component/retriever@components.lexical_retriever: jsonl_keyword
  - /component/retriever@components.dense_retriever: jsonl_embeddings
  - /component/fusion@components.fusion: rrf
  - _self_

components:
  input:
    type: retrieval_components.interfaces.stage_io.InferenceInput
  output:
    type: retrieval_components.interfaces.stage_io.InferenceOutput

connections:
  - sender: input.query_meta
    receiver: query_parser.meta
  - sender: query_parser.text
    receiver: query_preprocessor.text
  - sender: query_parser.text
    receiver: lexical_retriever.query
  - sender: query_parser.text
    receiver: output.query_content
  - sender: input.candidate_document_ids
    receiver: lexical_retriever.candidate_document_ids
  - sender: input.candidate_document_ids
    receiver: dense_retriever.candidate_document_ids
  - sender: query_preprocessor.text
    receiver: query_embedder.text
  - sender: query_embedder.embedding
    receiver: dense_retriever.query_embedding
  - sender: lexical_retriever.documents
    receiver: fusion.lexical
  - sender: dense_retriever.documents
    receiver: fusion.dense
  - sender: fusion.documents
    receiver: output.documents

max_runs_per_component: 100
metadata:
  description: Equal-weight reciprocal-rank fusion of keyword and dense JSONL retrieval.
  role: retrieve
  maturity: reusable
  input_mode: index
  storage_backend: jsonl
  compatible_index_granularity:
    - document
    - chunk
  requires:
    - selections.index_id
    - selections.embedding_model
