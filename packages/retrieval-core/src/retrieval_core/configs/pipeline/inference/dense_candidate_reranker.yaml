defaults:
  - /selections/embedding_model@_global_.selections.embedding_model: ???
  - /component/query_parser@components.query_parser: content_field
  - /component/query_preprocessor@components.query_preprocessor: prefix_cleanup
  - /component/query_embedder@components.query_embedder: sentence_transformers
  - /component/document_parser@components.document_parser: content_field
  - /component/document_preprocessor@components.document_prefixer: prefix_cleanup
  - /component/document_embedder@components.document_embedder: sentence_transformers
  - /component/ranker@components.ranker: embedding_similarity
  - _self_

components:
  input:
    type: retrieval_components.interfaces.stage_io.InferenceInput
  output:
    type: retrieval_components.interfaces.stage_io.InferenceOutput

connections:
  - sender: input.query_meta
    receiver: query_parser.meta
  - sender: query_parser.text
    receiver: query_preprocessor.text
  - sender: query_parser.text
    receiver: output.query_content
  - sender: input.candidate_documents
    receiver: document_parser.documents
  - sender: document_parser.documents
    receiver: document_prefixer.documents
  - sender: query_preprocessor.text
    receiver: query_embedder.text
  - sender: document_prefixer.documents
    receiver: document_embedder.documents
  - sender: query_embedder.embedding
    receiver: ranker.query_embedding
  - sender: document_embedder.documents
    receiver: ranker.documents
  - sender: ranker.documents
    receiver: output.documents

max_runs_per_component: 100
metadata:
  description: Bi-encoder reranking over materialized inference candidate documents.
