[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "retrieval-components"
version = "0.1.0"
description = "Reusable Haystack components for retrieval research projects."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
  "elasticsearch-haystack>=6,<7",
  "haystack-ai>=2.30,<3",
  "langchain-text-splitters>=0.3,<1",
  "numpy>=2,<3",
  "sentence-transformers>=4.1,<5",
]

[project.optional-dependencies]
dev = [
  "pytest>=8,<9",
  "ruff>=0.8,<1",
]

[tool.uv]
package = true

[tool.hatch.build.targets.wheel]
packages = ["src/retrieval_components"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
