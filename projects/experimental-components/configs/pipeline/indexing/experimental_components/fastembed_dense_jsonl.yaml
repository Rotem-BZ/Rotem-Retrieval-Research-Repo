# Project-owned choice: experimental_components
defaults:
  - /selections@_global_.selections: index
  - /selections/embedding_model@_global_.selections.embedding_model: ???
  - /component/document_source@components.document_source: jsonl
  - /component/document_parser@components.document_parser: content_field
  - /component/document_embedder@components.embedder: experimental_components/fastembed_dense
  - /component/indexer@components.indexer: jsonl_embeddings
  - _self_

components:
  output:
    type: retrieval_components.interfaces.stage_io.IndexingOutput

connections:
  - sender: document_source.documents
    receiver: document_parser.documents
  - sender: document_parser.documents
    receiver: embedder.documents
  - sender: embedder.documents
    receiver: indexer.documents
  - sender: indexer.index_path
    receiver: output.index_path
  - sender: indexer.indexed_count
    receiver: output.indexed_count

max_runs_per_component: 100
metadata:
  description: Dense JSONL indexing with the FastEmbed Haystack integration.
