schema_version: 1
stage: inference
base_overrides:
  - dataset={{ cookiecutter.dataset_config }}
  - input_mapping=full
  - selections/embedding_model={{ cookiecutter.embedding_model }}
  - stage.indexing_run_id=REPLACE_WITH_EXACT_INDEXING_RUN_ID
  - pipeline.components.retriever.init_parameters.top_k=100
  - runtime.device.device=cpu
combination_mode: cartesian
parameters:
  - path: pipeline/inference@pipeline
    label: variant
    values:
      - dense_jsonl
      - {{ cookiecutter.pipeline_name }}
    raw: true
