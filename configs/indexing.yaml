defaults:
  - paths: local
  - dataset: ???
  - pipeline/indexing@pipeline: ???
  - _self_

stage:
  name: indexing
  run_id: ${now:%Y%m%d_%H%M%S}
  output_dir: ${paths.runs_dir}/${stage.name}/${stage.run_id}

pipeline_run:
  inputs: {}
  include_outputs_from:
    - indexer
  concurrency_limit: 4

hydra:
  job:
    chdir: false
  run:
    dir: ${paths.runs_dir}/hydra/${stage.name}/${stage.run_id}
