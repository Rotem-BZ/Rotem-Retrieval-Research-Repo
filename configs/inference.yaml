defaults:
  - paths: local
  - dataset: ???
  - input_mapping: full
  - _self_
  - pipeline/inference@pipeline: ???

metadata:
  command_builder:
    prompt_overrides:
      - path: stage.run_name
        prompt: "inference run name"
        type: value
        require_non_empty: true

stage:
  name: inference
  run_name: ???
  run_id: ${now:%Y%m%d_%H%M%S}
  output_dir: ${paths.runs_dir}/${stage.name}/${stage.run_id}
  predictions_path: ${paths.predictions_dir}/${stage.run_name}.json

runtime:
  progress_bar: true
  device:
    type: single
    device: cuda
  concurrency_limit: 4

hydra:
  job:
    chdir: false
  run:
    dir: ${paths.runs_dir}/hydra/${stage.name}/${stage.run_id}
