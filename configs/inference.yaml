defaults:
  - paths: local
  - dataset: ???
  - input_mapping: full
  - pipeline/inference@pipeline: ???
  - _self_

stage:
  name: inference
  run_id: ${now:%Y%m%d_%H%M%S}
  output_dir: ${paths.runs_dir}/${stage.name}/${stage.run_id}
  predictions_path: ${paths.predictions_dir}/${dataset.name}.json

retrieval:
  top_k: 5

pipeline_run:
  inputs: {}
  query_input:
    component: retriever
    parameter: query
  candidate_id_input:
    component: retriever
    parameter: candidate_document_ids
  candidate_document_inputs: []
  documents_output:
    component: retriever
    field: documents
  include_outputs_from:
    - retriever
  concurrency_limit: 4

hydra:
  job:
    chdir: false
  run:
    dir: ${paths.runs_dir}/hydra/${stage.name}/${stage.run_id}
