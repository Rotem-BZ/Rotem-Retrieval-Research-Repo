components:
  output:
    type: retrieval_research.components.interfaces.stage_io.IndexingOutput
  document_source:
    type: retrieval_research.components.sources.jsonl_document_source.JsonlDocumentSource
    init_parameters:
      documents_path: ${dataset.documents_path}
  document_prefixer:
    type: retrieval_research.components.preprocessing.document_text_prefixer.DocumentTextPrefixer
    init_parameters:
      prefix: "passage: "
      replace_regexes:
        "\\s+": " "
  embedder:
    type: haystack.components.embedders.sentence_transformers_document_embedder.SentenceTransformersDocumentEmbedder
    init_parameters:
      model: intfloat/e5-small-v2
      normalize_embeddings: true
      device: ${runtime.device}
      progress_bar: ${runtime.progress_bar}
  indexer:
    type: retrieval_research.components.indexing.jsonl_document_indexer.JsonlDocumentIndexer
    init_parameters:
      output_path: ${paths.index_dir}/${stage.run_name}.jsonl
      overwrite: true

connections:
  - sender: document_source.documents
    receiver: document_prefixer.documents
  - sender: document_prefixer.documents
    receiver: embedder.documents
  - sender: embedder.documents
    receiver: indexer.documents
  - sender: indexer.index_path
    receiver: output.index_path
  - sender: indexer.indexed_count
    receiver: output.indexed_count

max_runs_per_component: 100
metadata:
  description: E5 indexing pipeline with document-level passage prefixing and JSONL embedding persistence.
