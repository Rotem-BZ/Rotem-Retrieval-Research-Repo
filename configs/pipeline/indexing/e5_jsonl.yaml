components:
  document_source:
    type: retrieval_research.components.jsonl_document_source.JsonlDocumentSource
    init_parameters:
      documents_path: ${dataset.documents_path}
  document_prefixer:
    type: retrieval_research.components.preprocessing.document_text_prefixer.DocumentTextPrefixer
    init_parameters:
      prefix: "passage: "
      replace_regexes:
        "\\s+": " "
  embedder:
    type: haystack.components.embedders.sentence_transformers_document_embedder.SentenceTransformersDocumentEmbedder
    init_parameters:
      model: intfloat/e5-small-v2
      normalize_embeddings: true
      device:
        type: single
        device: cuda
      progress_bar: true
  indexer:
    type: retrieval_research.components.jsonl_document_indexer.JsonlDocumentIndexer
    init_parameters:
      output_path: ${paths.index_dir}/${dataset.name}_e5.jsonl
      overwrite: true

connections:
  - sender: document_source.documents
    receiver: document_prefixer.documents
  - sender: document_prefixer.documents
    receiver: embedder.documents
  - sender: embedder.documents
    receiver: indexer.documents

max_runs_per_component: 100
metadata:
  description: E5 indexing pipeline with document-level passage prefixing and JSONL embedding persistence.
