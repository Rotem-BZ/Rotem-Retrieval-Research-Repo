components:
  document_source:
    type: retrieval_research.components.jsonl_document_source.JsonlDocumentSource
    init_parameters:
      documents_path: ${dataset.documents_path}
  indexer:
    type: retrieval_research.components.jsonl_document_indexer.JsonlDocumentIndexer
    init_parameters:
      output_path: ${paths.index_dir}/${dataset.name}.jsonl
      overwrite: true

connections:
  - sender: document_source.documents
    receiver: indexer.documents

max_runs_per_component: 100
metadata:
  description: Dummy JSONL indexing pipeline for scaffold validation.
