components:
  input:
    type: retrieval_research.components.interfaces.stage_io.InferenceInput
  output:
    type: retrieval_research.components.interfaces.stage_io.InferenceOutput
  retriever:
    type: retrieval_research.components.retrieval.jsonl_keyword_retriever.JsonlKeywordRetriever
    init_parameters:
      index_path: ${paths.index_dir}/${stage.run_name}.jsonl
      top_k: 5

connections:
  - sender: input.query
    receiver: retriever.query
  - sender: input.candidate_document_ids
    receiver: retriever.candidate_document_ids
  - sender: retriever.documents
    receiver: output.documents
max_runs_per_component: 100
metadata:
  description: Dummy keyword retrieval pipeline for scaffold validation.
