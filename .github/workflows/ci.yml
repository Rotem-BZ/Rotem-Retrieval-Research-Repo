name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.unit.name }} / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        unit:
          - name: retrieval-components
            project: packages/retrieval-components
            tests: packages/retrieval-components/tests
          - name: retrieval-core
            project: packages/retrieval-core
            tests: packages/retrieval-core/tests
          - name: query-repetition-e5
            project: projects/query-repetition-e5
            tests: projects/query-repetition-e5/tests

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --project ${{ matrix.unit.project }} --extra dev

      - name: Lint
        run: uv run --project ${{ matrix.unit.project }} ruff check ${{ matrix.unit.project }}

      - name: Test
        run: uv run --project ${{ matrix.unit.project }} pytest ${{ matrix.unit.tests }}

  toy-workflow:
    name: Core toy workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --project packages/retrieval-core --extra dev
      - run: >-
          uv run --project packages/retrieval-core stage --validate indexing
          dataset=toy pipeline/indexing@pipeline=dummy_jsonl
      - shell: bash
        run: |
          uv run --project packages/retrieval-core stage indexing dataset=toy pipeline/indexing@pipeline=dummy_jsonl stage.run_id=ci-toy-index
          uv run --project packages/retrieval-core stage inference dataset=toy pipeline/inference@pipeline=dummy_keyword stage.indexing_run_id=ci-toy-index stage.run_id=ci-toy-inference
          uv run --project packages/retrieval-core stage evaluation dataset=toy stage.inference_run_id=ci-toy-inference stage.run_id=ci-toy-evaluation
